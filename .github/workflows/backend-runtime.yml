name: Backend

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Maven, XML, SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compute whitespace base
        shell: bash
        run: |
          zero=0000000000000000000000000000000000000000
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" != "$zero" ]; then
            base="${{ github.event.before }}"
          elif git rev-parse --verify --quiet HEAD^ >/dev/null; then
            base=HEAD^
          else
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi
          echo "SIHSALUS_DIFF_BASE=$base" >> "$GITHUB_ENV"

      - name: Install XML tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Validate Liquibase XML files
        run: |
          find . \
            \( -path './.dev' -o -path './reference-sources' -o -path '*/target' \) -prune -o \
            -path '*/src/main/resources/*' \
            \( -name 'liquibase.xml' -o -name 'db.changelog*.xml' \) \
            -print0 | xargs -0 xmllint --noout

      - name: Run fast backend check
        run: ./scripts/check.sh fast

      - name: Run dependency scan and SBOM gate
        run: ./scripts/check.sh security

      - name: Upload Maven diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-maven-diagnostics
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/dependency-check-report.*
            target/bom.*
          if-no-files-found: ignore

  postgres-migration-gate:
    name: PostgreSQL Migration Gate
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: sihsalus_clean
          POSTGRES_USER: sihsalus
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sihsalus -d sihsalus_clean"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SIHSALUS_CLEAN_INSTALL_URL: jdbc:postgresql://localhost:5432/sihsalus_clean
      SIHSALUS_CLEAN_INSTALL_USERNAME: sihsalus
      SIHSALUS_CLEAN_INSTALL_PASSWORD: ci-postgres-password
      SIHSALUS_UPGRADE_FIXTURE_URL: ${{ secrets.SIHSALUS_UPGRADE_FIXTURE_URL }}
      SIHSALUS_UPGRADE_FIXTURE_USERNAME: ${{ secrets.SIHSALUS_UPGRADE_FIXTURE_USERNAME }}
      SIHSALUS_UPGRADE_FIXTURE_PASSWORD: ${{ secrets.SIHSALUS_UPGRADE_FIXTURE_PASSWORD }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run PostgreSQL migration gate
        run: ./scripts/check.sh db

  compose-smoke:
    name: Compose Runtime Smoke
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SIHSALUS_BACKEND_PORT: 18080
      SIHSALUS_POSTGRES_PASSWORD: ci-postgres-password
      SIHSALUS_ADMIN_USERNAME: admin
      SIHSALUS_ADMIN_PASSWORD: Admin123
      SIHSALUS_OCL_STATIC_IMPORT_ENABLED: "false"
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      COMPOSE_FILE: deploy/compose.yml
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6

      - name: Checkout static content
        uses: actions/checkout@v6
        with:
          repository: sihsalus/sihsalus-content
          path: .dev/reference-sources/sihsalus-content
          token: ${{ secrets.SIHSALUS_CONTENT_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          load: true
          tags: sihsalus-core:local
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Scan backend image
        run: ./scripts/check.sh image --image sihsalus-core:local

      - name: Start backend stack
        run: docker compose up -d --no-build backend

      - name: Wait for backend health
        run: |
          container_id="$(docker compose ps -q backend)"
          if [ -z "$container_id" ]; then
            docker compose ps
            exit 1
          fi

          for attempt in {1..60}; do
            health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container_id")"
            if [ "$health_status" = "healthy" ]; then
              exit 0
            fi
            docker compose ps backend
            sleep 10
          done

          docker compose logs --tail=300 backend
          exit 1

      - name: Verify actuator from inside container
        run: docker compose exec -T backend curl -fsS -m 5 http://localhost:8080/actuator/health

      - name: Verify authentication smoke
        run: |
          assert_status() {
            expected="$1"
            shift
            actual="$(docker compose exec -T backend curl -sS -o /tmp/sihsalus-smoke-body -w '%{http_code}' "$@")"
            if [ "$actual" != "$expected" ]; then
              echo "Expected HTTP $expected but got HTTP $actual for: $*"
              docker compose exec -T backend cat /tmp/sihsalus-smoke-body || true
              exit 1
            fi
          }

          assert_status 401 http://localhost:8080/rest/v1/patient?q=test
          assert_status 401 -u admin:not-the-password http://localhost:8080/rest/v1/patient?q=test
          assert_status 401 http://localhost:8080/api/fhir/metadata
          assert_status 401 http://localhost:8080/api/admin/static-modules
          assert_status 401 http://localhost:8080/api/system/info
          assert_status 401 'http://localhost:8080/module/htmlwidgets/patientSearch.form?q=a'

          session="$(docker compose exec -T backend curl -fsS -H 'Disable-WWW-Authenticate: true' -u admin:Admin123 http://localhost:8080/ws/rest/v1/session)"
          echo "$session" | grep -q '"authenticated":true'
          echo "$session" | grep -q '"username":"admin"'

      - name: Print logs on failure
        if: failure()
        run: docker compose logs --tail=300 backend postgres

      - name: Collect runtime diagnostics on failure
        if: failure()
        run: |
          mkdir -p artifacts/runtime
          docker compose ps > artifacts/runtime/compose-ps.txt
          docker compose logs --no-color backend postgres > artifacts/runtime/compose-logs.txt
          backend_container="$(docker compose ps -q backend || true)"
          if [ -n "$backend_container" ]; then
            docker inspect "$backend_container" > artifacts/runtime/backend-inspect.json
          fi

      - name: Upload runtime diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-runtime-diagnostics
          path: artifacts/runtime/**
          if-no-files-found: ignore

      - name: Stop stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  publish-ghcr:
    name: Publish GHCR Image
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs:
      - quality
      - postgres-migration-gate
      - compose-smoke
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6

      - name: Checkout static content
        uses: actions/checkout@v6
        with:
          repository: sihsalus/sihsalus-content
          path: .dev/reference-sources/sihsalus-content
          token: ${{ secrets.SIHSALUS_CONTENT_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image
