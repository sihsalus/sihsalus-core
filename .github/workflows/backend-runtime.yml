name: Backend Runtime

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  liquibase-xml:
    name: Liquibase XML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Validate Liquibase XML files
        run: |
          find sihsalus-core-liquibase/src/main/resources sihsalus-module-*/src/main/resources \
            \( -name 'liquibase.xml' -o -name 'db.changelog*.xml' \) \
            -print0 | xargs -0 xmllint --noout

  compose-smoke:
    name: Compose Runtime Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SIHSALUS_BACKEND_PORT: 18080
      SIHSALUS_OCL_STATIC_IMPORT_ENABLED: "false"
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6

      - name: Checkout static content
        uses: actions/checkout@v6
        with:
          repository: sihsalus/sihsalus-content
          path: reference-sources/sihsalus-content
          token: ${{ secrets.SIHSALUS_CONTENT_TOKEN || github.token }}

      - name: Build backend image
        run: docker compose build backend

      - name: Start backend stack
        run: docker compose up -d --no-build backend

      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' sihsalus-core-backend-1)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            docker compose ps backend
            sleep 10
          done

          docker compose logs --tail=300 backend
          exit 1

      - name: Verify actuator from inside container
        run: docker compose exec -T backend curl -fsS -m 5 http://localhost:8080/actuator/health

      - name: Print logs on failure
        if: failure()
        run: docker compose logs --tail=300 backend postgres

      - name: Stop stack
        if: always()
        run: docker compose down --volumes --remove-orphans
