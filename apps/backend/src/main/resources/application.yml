spring:
  application:
    name: sihsalus-core
  datasource:
    url: ${SIHSALUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sihsalus}
    username: ${SIHSALUS_DATASOURCE_USERNAME:sihsalus}
    password: ${SIHSALUS_DATASOURCE_PASSWORD:}
    hikari:
      connection-timeout: ${SIHSALUS_DATASOURCE_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SIHSALUS_DATASOURCE_VALIDATION_TIMEOUT:5000}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:30s}

server:
  shutdown: graceful
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  error:
    include-binding-errors: never
    include-message: never
    include-stacktrace: never
  servlet:
    session:
      timeout: ${SERVER_SERVLET_SESSION_TIMEOUT:30m}
  tomcat:
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:20s}

sihsalus:
  admin:
    username: ${SIHSALUS_ADMIN_USERNAME:admin}
    password: ${SIHSALUS_ADMIN_PASSWORD:}
  auth:
    mode: ${SIHSALUS_AUTH_MODE:}
    oauth2-enabled: ${OAUTH2_ENABLED:false}
  initializer:
    startup-load: ${SIHSALUS_INITIALIZER_STARTUP_LOAD:}
    domains: ${SIHSALUS_INITIALIZER_DOMAINS:}
    exclude:
      addresshierarchy: ${SIHSALUS_INITIALIZER_EXCLUDE_ADDRESSHIERARCHY:}
  ocl:
    static-import:
      enabled: ${SIHSALUS_OCL_STATIC_IMPORT_ENABLED:true}
      fail-on-errors: ${SIHSALUS_OCL_STATIC_IMPORT_FAIL_ON_ERRORS:true}
  scheduler:
    startup:
      enabled: ${SIHSALUS_SCHEDULER_STARTUP_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
