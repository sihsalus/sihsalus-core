spring:
  application:
    name: sihsalus-core
  datasource:
    url: ${SIHSALUS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sihsalus}
    username: ${SIHSALUS_DATASOURCE_USERNAME:sihsalus}
    password: ${SIHSALUS_DATASOURCE_PASSWORD:}
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml

server:
  error:
    include-binding-errors: never
    include-message: never
    include-stacktrace: never

sihsalus:
  admin:
    username: ${SIHSALUS_ADMIN_USERNAME:admin}
    password: ${SIHSALUS_ADMIN_PASSWORD:}
  auth:
    mode: ${SIHSALUS_AUTH_MODE:}
    oauth2-enabled: ${OAUTH2_ENABLED:false}
  initializer:
    startup-load: ${SIHSALUS_INITIALIZER_STARTUP_LOAD:}
    domains: ${SIHSALUS_INITIALIZER_DOMAINS:}
    exclude:
      addresshierarchy: ${SIHSALUS_INITIALIZER_EXCLUDE_ADDRESSHIERARCHY:}
  ocl:
    static-import:
      enabled: ${SIHSALUS_OCL_STATIC_IMPORT_ENABLED:true}
      fail-on-errors: ${SIHSALUS_OCL_STATIC_IMPORT_FAIL_ON_ERRORS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
